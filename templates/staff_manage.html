{% extends "base.html" %}
{% block title %}スタッフ管理{% endblock %}
{% block body_class %}page-items{% endblock %}

{% block content %}
<h1 class="page-title">
    <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    スタッフ管理
</h1>

<!-- Add new staff -->
<div class="panel" style="max-width:500px; margin-bottom:1.5rem;">
    <h2 class="panel-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        新しいスタッフを登録
    </h2>
    <form method="post" action="{{ url_for('staff.staff_add') }}" style="display:flex; gap:.5rem; align-items:flex-end;">
        <div class="form-group" style="flex:1; margin-bottom:0;">
            <label>スタッフ名</label>
            <input type="text" name="name" placeholder="例: 田中" required>
        </div>
        <button type="submit" class="btn btn-accent" style="height:fit-content;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            登録
        </button>
    </form>
</div>

<!-- Staff list -->
{% if staffs %}
<div class="table-wrap" style="max-width:500px;">
    <table class="table">
        <thead>
            <tr>
                <th>スタッフ名</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for s in staffs %}
            <tr>
                <td>
                    <form method="post" action="{{ url_for('staff.staff_edit', staff_id=s.id) }}" style="display:flex; gap:.35rem; align-items:center;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" name="name" value="{{ s.name }}" style="padding:.3rem .5rem; border:1px solid var(--gray-200); border-radius:var(--radius); font-size:.85rem; width:140px;">
                        <button type="submit" class="btn btn-sm btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            保存
                        </button>
                    </form>
                </td>
                <td>
                    <form method="post" action="{{ url_for('staff.staff_delete', staff_id=s.id) }}" style="display:inline" onsubmit="return confirm('「{{ s.name }}」を削除しますか？')">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            削除
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="empty-state" style="max-width:500px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    <p>スタッフが登録されていません。</p>
</div>
{% endif %}

<div style="margin-top:1rem;">
    <a href="{{ url_for('inventory.item_manage') }}" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        アイテム管理に戻る
    </a>
</div>
{% endblock %}
