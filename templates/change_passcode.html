{% extends "base.html" %}
{% block title %}アカウントID変更{% endblock %}
{% block body_class %}page-items{% endblock %}

{% block content %}
<h1 class="page-title">
    <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    アカウントID変更
</h1>

<form method="post" class="panel form-panel">
    <div class="form-group">
        <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            現在のアカウントID
        </label>
        <input type="password" name="current" required>
    </div>
    <div class="form-group">
        <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v4a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
            新しいアカウントID
        </label>
        <input type="password" name="new_passcode" required>
    </div>
    <div class="form-group">
        <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            新しいアカウントID（確認）
        </label>
        <input type="password" name="confirm" required>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-accent">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            変更する
        </button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">キャンセル</a>
    </div>
</form>
{% endblock %}
