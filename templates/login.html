<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - たにむら在庫管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#be185d">
</head>
<body class="page-dashboard" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="toast toast-{{ category }}" id="toast-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            {% if category == 'success' %}
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            {% else %}
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
            {% endif %}
        </svg>
        <span>{{ message }}</span>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="login-card">
        <div class="login-icon">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="" style="width:48px; height:48px; border-radius:12px;">
        </div>
        <h1 class="login-title">たにむら在庫管理</h1>
        <p class="login-sub">名前を選択し、アカウントIDを入力してください</p>
        <form method="post" class="login-form">
            <div class="login-input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <select name="staff_name" required>
                    <option value="">-- スタッフを選択 --</option>
                    <option value="ゲスト">ゲスト</option>
                    {% for s in staffs %}
                    <option value="{{ s.name }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="login-input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" name="passcode" placeholder="アカウントID" required>
            </div>
            <button type="submit" class="login-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                ログイン
            </button>
        </form>
        {% if not staffs %}
        <p style="margin-top:1rem; font-size:.75rem; color:var(--gray-400);">スタッフが未登録です。ログイン後「スタッフ」タブから登録してください。</p>
        {% endif %}
    </div>

    <script>
    (function() {
        var t = document.getElementById('toast-msg');
        if (t) {
            setTimeout(function() { t.classList.add('show'); }, 50);
            setTimeout(function() { t.classList.remove('show'); }, 3500);
            setTimeout(function() { t.remove(); }, 4000);
        }
    })();
    </script>
</body>
</html>
